{% extends 'base.html' %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<div class="row">

    <div class="col-md-3">

        <div class="card card-stat bg-primary text-white">

            <h6>Total Students</h6>

            <h2>500</h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card card-stat bg-danger text-white">

            <h6>At Risk Students</h6>

            <h2>75</h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card card-stat bg-success text-white">

            <h6>Prediction Accuracy</h6>

            <h2>89%</h2>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card card-stat bg-warning text-dark">

            <h6>Predictions Made</h6>

            <h2>420</h2>

        </div>

    </div>

</div>

<div class="row mt-4">

    <div class="col-md-6">

        <div class="chart-card">

            <h5>Pass vs Fail Predictions</h5>

            <canvas id="passFailChart"></canvas>

        </div>

    </div>

    <div class="col-md-6">

        <div class="chart-card">

            <h5>Prediction Accuracy</h5>

            <canvas id="accuracyChart"></canvas>

        </div>

    </div>

</div>

<div class="row mt-4">

    <div class="col-md-12">

        <div class="chart-card">

            <h5>Attendance Trends</h5>

            <canvas id="attendanceChart"></canvas>

        </div>

    </div>

</div>

<script>

new Chart(
document.getElementById('passFailChart'),
{
type:'pie',
data:{
labels:['Pass','Fail'],
datasets:[{
data:[420,80]
}]
}
});

new Chart(
document.getElementById('accuracyChart'),
{
type:'bar',
data:{
labels:['Decision Tree','Random Forest','SVM'],
datasets:[{
label:'Accuracy',
data:[81,89,85]
}]
}
});

new Chart(
document.getElementById('attendanceChart'),
{
type:'line',
data:{
labels:[
'Jan',
'Feb',
'Mar',
'Apr',
'May',
'Jun'
],
datasets:[{
label:'Attendance %',
data:[
78,
80,
83,
85,
87,
89
]
}]
}
});

</script>

{% endblock %}
