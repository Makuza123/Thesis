<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="wrapper">

<div class="sidebar">

<div class="logo">

<h2>SPPS</h2>

</div>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="students.html">Students</a></li>

<li><a href="upload.html">Upload Dataset</a></li>

<li><a href="prediction.html">Prediction</a></li>

<li><a href="reports.html">Reports</a></li>

<li><a href="student-portal.html">Student Portal</a></li>

</ul>

</div>

<div class="main">

<div class="navbar">

<h2>Dashboard</h2>

</div>

<div class="cards">

<div class="card">
<h4>Total Students</h4>
<h2>500</h2>
</div>

<div class="card">
<h4>At Risk Students</h4>
<h2>75</h2>
</div>

<div class="card">
<h4>Prediction Accuracy</h4>
<h2>89%</h2>
</div>

<div class="card">
<h4>Predictions Made</h4>
<h2>420</h2>
</div>

</div>

<div class="chart-box">
<canvas id="chart1"></canvas>
</div>

<div class="chart-box">
<canvas id="chart2"></canvas>
</div>

</div>

</div>

<script>

new Chart(document.getElementById('chart1'),{
type:'pie',
data:{
labels:['Pass','Fail'],
datasets:[{
data:[420,80]
}]
}
});

new Chart(document.getElementById('chart2'),{
type:'bar',
data:{
labels:['Decision Tree','Random Forest','SVM'],
datasets:[{
label:'Accuracy',
data:[81,89,85]
}]
}
});

</script>

</body>
</html>
